name: Weekly YouTube Transcription
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Write YouTube cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run transcription bot
        run: python transcribe.py
